name: Update & Deploy

on:
  schedule:
    - cron: "0 9 * * *"     # every day at 09:00 UTC
  workflow_dispatch:          # allow manual runs
  push:
    branches: [main]

permissions:
  contents: write             # to commit refreshed data back
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt

      - name: Update dataset (latest results)
        run: python update_data.py

      - name: Run predictions (live + pre-tournament)
        run: python run_pipeline.py 40000 both

      # Always builds the copy-ready outputs/tweets.html (free, manual posting).
      # Auto-posts to X only when AUTO_TWEET=true AND it is the daily scheduled
      # run — so a push never tweets, and by default nothing is paid.
      - name: Daily tweet kit
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          MAX_TWEETS: ${{ vars.MAX_TWEETS }}
          AUTO_TWEET: ${{ github.event_name == 'schedule' && vars.AUTO_TWEET || '' }}
        run: python tweet.py || true

      - name: Commit refreshed data & odds history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.csv shootouts.csv goalscorers.csv former_names.csv outputs/history.csv
          git diff --staged --quiet || git commit -m "chore: daily data + odds update"
          git push || true

      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r outputs _site/outputs
          cp -r outputs_pretournament _site/outputs_pretournament
          cp compare.html _site/ 2>/dev/null || true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
