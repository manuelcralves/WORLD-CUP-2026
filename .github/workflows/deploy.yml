name: Update & Deploy

on:
  schedule:
    - cron: "0 */2 * * *"   # every 2 hours — refresh projections/standings shortly after each game (Highlightly auto-feeds the results)
  workflow_dispatch:          # allow manual runs
  push:
    branches: [main]

permissions:
  contents: write             # to commit refreshed data back
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt

      - name: Update dataset (latest results)
        run: python update_data.py

      # Real results we sourced and submitted to martj42 (PR pending review).
      # Idempotent: once the PR is merged and update_data.py pulls them, the
      # script skips every row and this becomes a no-op (then we can drop it).
      - name: Apply pending upstream results (not yet merged)
        run: python martj42_contribute.py .

      # Squads, line-ups and match events (goals/cards/subs) from the Highlightly
      # API. Cached under api_cache/; tolerant — a missing key or API hiccup just
      # falls back to the committed CSVs, so the build never breaks on it.
      - name: Fetch World Cup rich data (Highlightly)
        env:
          HIGHLIGHTLY_KEY: ${{ secrets.HIGHLIGHTLY_KEY }}
        run: python fetch_wc_data.py || echo "rich-data fetch skipped — using cached CSVs"

      # Fill WC scores into results.csv straight from the Highlightly cache, so the
      # model has fresh results within ~2h of a game ending (no waiting for the
      # daily martj42 pull). Goal scorers stay manual/martj42 (name spelling).
      - name: Feed Highlightly results into the dataset
        run: python feed_highlightly.py . || true

      - name: Run predictions (live + pre-tournament)
        env:                                   # for the Supabase match-table push
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python run_pipeline.py 1000000 both

      # Always builds the copy-ready outputs/tweets.html. Also auto-posts the
      # full thread to X on the daily scheduled run and on a manual "Run
      # workflow" (never on a code push). Off switch: set repo Variable
      # AUTO_TWEET=false. Cap the thread length with the MAX_TWEETS Variable.
      - name: Daily tweet kit
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          MAX_TWEETS: ${{ vars.MAX_TWEETS }}
          AUTO_TWEET: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && vars.AUTO_TWEET != 'false' && 'true' || '' }}
        run: python tweet.py || true

      - name: Commit refreshed data & odds history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.csv shootouts.csv goalscorers.csv former_names.csv outputs/history.csv outputs/golden_history.csv api_cache
          git diff --staged --quiet || git commit -m "chore: daily data + odds + golden-boot history update"
          git push || true

      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r outputs _site/outputs
          cp -r outputs_pretournament _site/outputs_pretournament
          cp compare.html _site/ 2>/dev/null || true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
